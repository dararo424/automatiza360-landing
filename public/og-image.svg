<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#070E1B"/>

  <!-- Grid dots -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.08)"/>
    </pattern>
    <radialGradient id="glow1" cx="70%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#00C278" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00C278" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- WhatsApp chat bubble (right side decoration) -->
  <rect x="760" y="140" width="380" height="80" rx="16" fill="#1F2C34"/>
  <text x="780" y="176" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">Cliente</text>
  <text x="780" y="200" font-family="Arial, sans-serif" font-size="18" fill="#e2e8f0">¿Tienen disponibilidad hoy?</text>

  <rect x="760" y="240" width="380" height="100" rx="16" fill="#005C4B"/>
  <text x="780" y="270" font-family="Arial, sans-serif" font-size="16" fill="#86efac">Bot Automatiza360</text>
  <text x="780" y="295" font-family="Arial, sans-serif" font-size="17" fill="#e2e8f0">¡Hola! ✅ Tenemos citas</text>
  <text x="780" y="320" font-family="Arial, sans-serif" font-size="17" fill="#e2e8f0">disponibles hoy a las 3pm y 5pm</text>

  <rect x="760" y="360" width="380" height="60" rx="16" fill="#1F2C34"/>
  <text x="780" y="395" font-family="Arial, sans-serif" font-size="18" fill="#e2e8f0">La de las 3pm por favor 🙌</text>

  <rect x="760" y="440" width="380" height="80" rx="16" fill="#005C4B"/>
  <text x="780" y="470" font-family="Arial, sans-serif" font-size="17" fill="#e2e8f0">✅ ¡Cita confirmada! Te recuerdo</text>
  <text x="780" y="495" font-family="Arial, sans-serif" font-size="17" fill="#e2e8f0">mañana 🔔</text>

  <!-- Left side: Logo + headline -->
  <text x="80" y="160" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="42" fill="white">Automatiza</text>
  <text x="80" y="210" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="42" fill="#00C278">360</text>

  <!-- Divider -->
  <rect x="80" y="240" width="60" height="4" rx="2" fill="#00C278"/>

  <!-- Headline -->
  <text x="80" y="310" font-family="Arial, sans-serif" font-weight="700" font-size="48" fill="white">Tu WhatsApp</text>
  <text x="80" y="370" font-family="Arial, sans-serif" font-weight="700" font-size="48" fill="white">que trabaja</text>
  <text x="80" y="430" font-family="Arial, sans-serif" font-weight="700" font-size="48" fill="#00C278">solo.</text>

  <!-- Subtext -->
  <text x="80" y="490" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8">Bot de WhatsApp con IA para tu negocio.</text>
  <text x="80" y="522" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8">Pedidos · Citas · Cotizaciones</text>

  <!-- CTA pill -->
  <rect x="80" y="555" width="260" height="48" rx="24" fill="#00C278"/>
  <text x="210" y="585" font-family="Arial, sans-serif" font-weight="700" font-size="19" fill="#070E1B" text-anchor="middle">Actívalo en 5 minutos →</text>
</svg>
